name: build html
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: codeberg-medium
    permissions:
      contents: write
    concurrency:
      group: build-html-${{ matrix.branch }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - rev: sysv
            branch: book-sysv
            subdir: blfs-book
          - rev: systemd
            branch: book-systemd
            subdir: blfs-systemd
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: install dependencies
        run: |
          apt-get update
          apt-get install -y git make libxml2-utils xsltproc docbook-xsl docbook-xml tidy
      - name: build book
        run: |
          mkdir -p /tmp/blfs-output/${{ matrix.subdir }}
          REV=${{ matrix.rev }} BASEDIR=/tmp/blfs-output/${{ matrix.subdir }} make
      - name: deploy book
        run: |
          git config user.name "Codeberg Actions"
          git config user.email "actions@codeberg.org"
          git fetch origin ${{ matrix.branch }}:${{ matrix.branch }} || true
          git checkout ${{ matrix.branch }} 2>/dev/null || git checkout --orphan ${{ matrix.branch }}
          git rm -rf .
          cp -r /tmp/blfs-output/${{ matrix.subdir }}/. .
          git add -A
          git commit -m "chore: build $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push origin ${{ matrix.branch }}

